<div class="form-shell">
  <h1>FFCCC Intake Form</h1>
  <div class="form-note"><strong>Function-Focused Controlled Medication & Complex Care:</strong> This intake helps structure assessment around function, safety, stabilization, and shared care planning.</div>
  <div class="form-grid">
    <div><label>Patient name</label><input></div>
    <div><label>Date of birth</label><input type="date"></div>
    <div><label>Phone</label><input></div>
    <div><label>Email</label><input type="email"></div>
  </div>
  <label>What are you unable to do now that you want to be able to do?</label><textarea></textarea>
  <label>Main concerns (mental health, pain, addiction, sleep, medication complexity, other)</label><textarea></textarea>
  <label>Current medications including opioids / benzodiazepines / Z-drugs</label><textarea></textarea>
  <label>Past treatment attempts and what helped / did not help</label><textarea></textarea>
  <label>Function goals</label><textarea></textarea>
  <label>Safety concerns or side effects</label><textarea></textarea>
  <label>Preferred pharmacy and current prescribers</label><textarea></textarea>
  <div class="checkbox"><input type="checkbox" id="ack"><label for="ack" style="margin:0">I understand this service may involve consultation, short-term stabilization, and shared-care recommendations rather than automatic long-term transfer of care.</label></div>
  <div class="form-actions"><a class="btn btn-outline" href="index.html">Back to Home</a><button class="btn btn-primary" onclick="window.print()">Print / Save PDF</button></div>
</div>
